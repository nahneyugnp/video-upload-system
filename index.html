<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VideoHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="frontend/css/app.css">
</head>
<body>

<nav class="nav">
  <a href="/videohub/" class="nav-logo">&#9654; VideoHub</a>
  <a href="frontend/upload.html" class="btn">+ Upload</a>
</nav>

<main class="page">
  <div class="page-header">
    <h1 class="page-title">All Videos</h1>
    <span id="count" class="page-count"></span>
  </div>

  <div id="grid" class="grid"></div>
  <div id="pg" class="pagination"></div>
</main>

<script>
const fmt = s => {
  const m   = Math.floor((s || 0) / 60);
  const sec = (s || 0) % 60;
  return m + ":" + String(sec).padStart(2, "0");
};

const ago = d => {
  const s = (Date.now() - new Date(d)) / 1000;
  if (s < 60)    return "just now";
  if (s < 3600)  return Math.floor(s / 60) + "m ago";
  if (s < 86400) return Math.floor(s / 3600) + "h ago";
  return Math.floor(s / 86400) + "d ago";
};

async function load(page = 1) {
  const r = await fetch(`/videohub/api/videos/list.php?page=${page}&limit=12`);
  const d = await r.json();

  document.getElementById("count").textContent = d.total + " videos";
  const g = document.getElementById("grid");

  if (!d.videos?.length) {
    g.innerHTML = '<p class="empty">No videos yet. <a href="frontend/upload.html">Upload one</a></p>';
    return;
  }

  g.innerHTML = d.videos.map(v => `
    <article class="card" onclick="location.href='frontend/watch.html?id=${v.id}'">
      <div class="card-thumb">
        ${v.thumb_path
          ? `<img src="/videohub/${v.thumb_path}" alt="${v.title}" loading="lazy">`
          : '<div class="thumb-empty"></div>'
        }
        <span class="badge">${fmt(v.duration)}</span>
      </div>
      <div class="card-body">
        <p class="card-title">${v.title}</p>
        <p class="card-meta">${Number(v.views).toLocaleString()} views &bull; ${ago(v.created_at)}</p>
      </div>
    </article>
  `).join("");

  const pg = document.getElementById("pg");
  pg.innerHTML = [...Array(d.pages)].map((_, i) =>
    `<button class="pg-btn${i + 1 === page ? " active" : ""}" onclick="load(${i + 1})">${i + 1}</button>`
  ).join("");
}

load();
</script>
</body>
</html>
